name: Deploy Whimsy Chess to GitHub Pages

on:
  push:
    branches:
      - pgn-loader-and-games-2026-06-29
      - main
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Copy whimsy-chess to public/
        run: |
          rm -rf public || true
          mkdir -p public
          cp -r whimsy-chess/* public/
          # Also make Maestro the site root
          cp -f whimsy-chess/maestro.html public/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          # Use the actions bot identity for the commit
          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"

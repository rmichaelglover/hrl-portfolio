<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ultrabullet Emulator — local chess clock</title>
<style>:root{--bg:#262522;--panel:#33312e;--ink:#eee;--mut:#aaa;--lt:#f0d9b5;--dk:#b58863;--go:#81b64c}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:15px system-ui}.wrap{max-width:980px;margin:auto;padding:22px}.top{display:flex;align-items:center;gap:12px;flex-wrap:wrap}.top h1{margin:0;font-size:22px}.tag{color:#bbb}.app{display:grid;grid-template-columns:minmax(280px,600px) 280px;gap:20px;margin-top:18px}@media(max-width:800px){.app{grid-template-columns:1fr}}#board{display:grid;grid-template-columns:repeat(8,1fr);aspect-ratio:1;box-shadow:0 5px 25px #0008}.sq{display:grid;place-items:center;font-size:clamp(25px,7vw,55px);cursor:pointer;position:relative}.l{background:var(--lt)}.d{background:var(--dk)}.sel{box-shadow:inset 0 0 0 6px #d5e83a}.last:after{content:"";position:absolute;inset:0;background:#d5e83a55}.pc{position:relative;z-index:1}.side{display:flex;flex-direction:column;gap:12px}.clock{font:700 42px ui-monospace,monospace;background:#181715;padding:12px;border-radius:7px;text-align:center}.clock.on{background:#eee;color:#222}.card{background:var(--panel);padding:14px;border-radius:8px}button,select{font:inherit;padding:9px 12px;border:0;border-radius:6px}button{background:var(--go);color:#fff;font-weight:700;cursor:pointer}.row{display:flex;gap:8px;flex-wrap:wrap}.moves{height:150px;overflow:auto;font:13px ui-monospace,monospace;color:#ddd}.note{color:var(--mut);font-size:12px;line-height:1.5}.links a{color:#9dccf5}</style></head><body><main class="wrap"><div class="top"><h1>⚡ Ultrabullet Emulator</h1><span class="tag">local · private · unofficial</span></div><div class="app"><div id="board" aria-label="interactive chessboard"></div><aside class="side"><div id="cb" class="clock">0:15.0</div><div class="card"><div class="row"><select id="tc" aria-label="time control"><option value="15">15+0</option><option value="30">30+0</option><option value="60">1+0</option></select><button id="new">New game</button></div><p class="note">Tap a piece, then a destination. The emulator permits exploratory moves; its purpose is rhythm and clock practice, not rated play.</p></div><div id="cw" class="clock on">0:15.0</div><div class="card moves" id="moves">Move log</div><div class="card links"><a href="maestro.html">Open its Musical Maestro →</a></div></aside></div></main>
<script>const glyph={K:'♔',Q:'♕',R:'♖',B:'♗',N:'♘',P:'♙',k:'♚',q:'♛',r:'♜',b:'♝',n:'♞',p:'♟'};const start='rnbqkbnrpppppppp................................PPPPPPPPRNBQKBNR'.split('');let b,sel,turn,times,last,timer,moves=[];const board=document.querySelector('#board');function draw(){board.innerHTML='';b.forEach((p,i)=>{let s=document.createElement('div');s.className='sq '+(((i>>3)+(i&7))%2?'d':'l')+(sel===i?' sel':'')+(last&&last.includes(i)?' last':'');s.innerHTML=p?`<span class="pc">${glyph[p]}</span>`:'';s.onclick=()=>tap(i);board.append(s)})}function tap(i){if(sel==null){if(b[i]&&(/[A-Z]/.test(b[i]))===turn)sel=i}else{if(sel!==i){let p=b[sel];b[i]=p;b[sel]='';last=[sel,i];moves.push(`${turn?'W':'B'} ${square(sel)}–${square(i)}`);turn=!turn;renderLog()}sel=null}draw()}function square(i){return'abcdefgh'[i%8]+(8-(i>>3))}function fmt(n){return`0:${String(Math.floor(n/1000)).padStart(2,'0')}.${Math.floor(n%1000/100)}`}function tick(){times[turn?0:1]=Math.max(0,times[turn?0:1]-100);document.querySelector('#cw').textContent=fmt(times[0]);document.querySelector('#cb').textContent=fmt(times[1]);document.querySelector('#cw').classList.toggle('on',turn);document.querySelector('#cb').classList.toggle('on',!turn)}function renderLog(){document.querySelector('#moves').innerHTML=moves.length?moves.map(x=>`<div>${x}</div>`).join(''):'Move log'}function reset(){clearInterval(timer);b=[...start];sel=null;last=null;turn=true;moves=[];let n=+document.querySelector('#tc').value*1000;times=[n,n];tick();draw();renderLog();timer=setInterval(tick,100)}document.querySelector('#new').onclick=reset;reset()</script></body></html>

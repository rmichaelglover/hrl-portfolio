<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Elbie's World — Music Garden</title><style>:root{--sky:#8fd8ff;--grass:#55ad5b;--ink:#183023}*{box-sizing:border-box}body{margin:0;background:linear-gradient(var(--sky) 0 52%,var(--grass) 52%);color:var(--ink);font:16px/1.5 system-ui;min-height:100vh}.wrap{max-width:900px;margin:auto;padding:28px 16px;text-align:center}h1{font:800 clamp(30px,7vw,58px) Georgia;margin:0}.world{height:390px;position:relative;overflow:hidden;border:5px solid #fff8;border-radius:24px;margin:20px 0;background:linear-gradient(#8fd8ff 0 58%,#5dbb63 58%);box-shadow:0 14px 35px #17342155}.sun{position:absolute;width:80px;height:80px;border-radius:50%;background:#ffe76b;right:10%;top:9%;box-shadow:0 0 35px #fff08d}.hill{position:absolute;width:75%;height:55%;background:#318a54;border-radius:50% 50% 0 0;left:-15%;bottom:-25%}.pond{position:absolute;width:42%;height:18%;background:#55c8e8;border-radius:50%;right:5%;bottom:5%}.friend{position:absolute;font-size:55px;filter:drop-shadow(0 4px 2px #0002);cursor:pointer;user-select:none}.f1{left:12%;bottom:14%}.f2{left:40%;bottom:20%}.f3{right:16%;bottom:12%}.notes{position:absolute;inset:0;pointer-events:none;font-size:28px}.note{position:absolute;animation:fly 1.6s ease-out forwards}@keyframes fly{to{transform:translateY(-130px) rotate(25deg);opacity:0}}button{font:700 16px system-ui;border:0;border-radius:99px;background:#603bb9;color:#fff;padding:12px 20px;cursor:pointer;margin:4px}.copy{max-width:620px;margin:auto}a{color:#173f80}</style></head><body><main class="wrap"><h1>🌱 Elbie’s Music Garden</h1><p class="copy">Gooblets hum, Zappies answer, and the pond supplies a soft bass note. Tap a friend or let the garden sing itself.</p><div class="world" id="world"><div class="sun"></div><div class="hill"></div><div class="pond"></div><div class="friend f1" data-note="60">🔴</div><div class="friend f2" data-note="64">🌸</div><div class="friend f3" data-note="67">🔵</div><div class="notes" id="notes"></div></div><button id="sing">▶ Garden song</button><button id="rain">🌧️ Rain bell</button><p><a href="../genesis/world/">Visit Gooblets &amp; Zappies →</a></p></main><script>let ac;const ns=document.querySelector('#notes');async function sound(midi,type='sine',dur=1){ac??=new AudioContext;await ac.resume();let o=ac.createOscillator(),g=ac.createGain();o.type=type;o.frequency.value=440*2**((midi-69)/12);g.gain.setValueAtTime(.001,ac.currentTime);g.gain.exponentialRampToValueAtTime(.09,ac.currentTime+.04);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+dur);o.connect(g).connect(ac.destination);o.start();o.stop(ac.currentTime+dur+.05);let n=document.createElement('span');n.className='note';n.textContent=['♪','♫','♩'][midi%3];n.style.left=(20+Math.random()*60)+'%';n.style.top=(45+Math.random()*35)+'%';ns.append(n);setTimeout(()=>n.remove(),1700)}document.querySelectorAll('.friend').forEach(x=>x.onclick=()=>sound(+x.dataset.note,'sine',1));document.querySelector('#sing').onclick=()=>[60,64,67,72,69,67,64,60].forEach((n,i)=>setTimeout(()=>sound(n,i%2?'triangle':'sine',1.2),i*360));document.querySelector('#rain').onclick=()=>[79,76,72,67].forEach((n,i)=>setTimeout(()=>sound(n,'sine',1.5),i*170))</script></body></html>
